<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Mubarak</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
</head>
<body id="main-body">
    
    <div id="intro-screen">
        <button id="open-btn">Tap to reveal your greeting ✨</button>
    </div>

    <audio id="bg-music" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div class="night-sky" id="sky">
        
        <div class="geo-star g1"></div><div class="geo-star g2"></div>
        <div class="geo-star g3"></div><div class="geo-star g4"></div>
        <div class="geo-star g5"></div><div class="geo-star g6"></div>
        <div class="geo-star g7"></div><div class="geo-star g8"></div>

        <div class="mandala-container" id="mandala">
            <svg viewBox="0 0 200 200" class="mandala-svg">
                <g fill="none" stroke="rgba(251, 220, 115, 0.4)" stroke-width="0.5">
                    <circle cx="100" cy="100" r="90"/>
                    <circle cx="100" cy="100" r="70"/>
                    <path d="M100 10 L110 90 L190 100 L110 110 L100 190 L90 110 L10 100 L90 90 Z"/>
                    <path d="M100 30 L105 95 L170 100 L105 105 L100 170 L95 105 L30 100 L95 95 Z" transform="rotate(45 100 100)"/>
                    <circle cx="100" cy="100" r="30"/>
                    <path d="M100 70 A30 30 0 0 1 130 100 A30 30 0 0 1 100 130 A30 30 0 0 1 70 100 A30 30 0 0 1 100 70" stroke-width="1"/>
                </g>
            </svg>
        </div>

        <div class="shooting-star"></div>

        <div class="lantern-container">
            <div class="lantern-chain"></div>
            <div class="lantern">
                <div class="lantern-top"></div>
                <div class="lantern-dome"></div>
                <div class="lantern-body">
                    <div class="lantern-candle"></div>
                </div>
                <div class="lantern-base"></div>
            </div>
        </div>

        <div class="moon"></div>

        <div class="greeting-card">
            <h1 class="elegant-greeting">Eid Mubarak<span id="recipient-name"></span></h1>
            <p class="sub-greeting">Wishing you and your family a truly blessed, peaceful, and joyous Eid.</p>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const customName = urlParams.get('to');
        if (customName) {
            document.getElementById('recipient-name').innerText = ", " + customName.charAt(0).toUpperCase() + customName.slice(1);
        }

        const introScreen = document.getElementById('intro-screen');
        const openBtn = document.getElementById('open-btn');
        const mandala = document.getElementById('mandala');
        const audio = document.getElementById('bg-music');

        // Opening the Gift
        openBtn.addEventListener('click', function() {
            audio.play(); 
            introScreen.style.opacity = '0'; 
            setTimeout(() => { introScreen.style.display = 'none'; }, 1000);
            document.body.classList.add('unboxed');
        });

        // MANDALA TRIGGER: On click or tap
        document.addEventListener('mousedown', function() {
            if(document.body.classList.contains('unboxed')) {
                mandala.classList.toggle('active');
            }
        });

        // Sparkle effect
        function createSparkle(x, y) {
            const sparkle = document.createElement('div');
            sparkle.className = 'magic-sparkle';
            sparkle.style.left = x + 'px';
            sparkle.style.top = y + 'px';
            document.body.appendChild(sparkle);
            setTimeout(() => { sparkle.remove(); }, 800);
        }
        document.addEventListener('mousemove', (e) => { if(Math.random() > 0.4) createSparkle(e.clientX, e.clientY); });
    </script>
</body>
</html>
