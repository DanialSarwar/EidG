<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Mubarak</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>
    
    <div id="intro-screen">
        <button id="open-btn">Tap to reveal your greeting ✨</button>
    </div>

    <audio id="bg-music" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div class="night-sky">
        <div class="shooting-star"></div>
        <div class="shooting-star star-2"></div>

        <div class="lantern-container">
            <div class="lantern-chain"></div>
            <div class="lantern">
                <div class="lantern-top"></div>
                <div class="lantern-body">
                    <div class="lantern-candle"></div>
                </div>
                <div class="lantern-base"></div>
            </div>
        </div>

        <div class="moon"></div>

        <div class="star star1"></div>
        <div class="star star2"></div>
        <div class="star star3"></div>
        <div class="star star4"></div>
        <div class="star star5"></div>
        <div class="star star6"></div>
        <div class="star star7"></div>

        <div class="greeting-card">
            <h1 class="elegant-greeting">Eid Mubarak<span id="recipient-name"></span></h1>
            <p class="sub-greeting">Wishing you and your family a truly blessed, peaceful, and joyous Eid.</p>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const customName = urlParams.get('to');
        const nameElement = document.getElementById('recipient-name');
        
        if (customName) {
            const formattedName = customName.charAt(0).toUpperCase() + customName.slice(1);
            nameElement.innerText = ", " + formattedName;
        }

        const introScreen = document.getElementById('intro-screen');
        const openBtn = document.getElementById('open-btn');
        const audio = document.getElementById('bg-music');

        openBtn.addEventListener('click', function() {
            audio.play(); 
            introScreen.style.opacity = '0'; 
            setTimeout(() => {
                introScreen.style.display = 'none';
            }, 1000);
            document.body.classList.add('unboxed');
        });

        function createSparkle(x, y) {
            const sparkle = document.createElement('div');
            sparkle.className = 'magic-sparkle';
            sparkle.style.left = x + 'px';
            sparkle.style.top = y + 'px';
            document.body.appendChild(sparkle);
            setTimeout(() => { sparkle.remove(); }, 800);
        }

        document.addEventListener('mousemove', function(e) {
            if(Math.random() > 0.4) createSparkle(e.clientX, e.clientY);
        });

        document.addEventListener('touchmove', function(e) {
            let touch = e.touches[0];
            if(Math.random() > 0.4) createSparkle(touch.clientX, touch.clientY);
        });
    </script>
</body>
</html>
